<!DOCTYPE html>
<html lang="ru" class="{{ palette | default('') }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Голос рисунка{% endblock %}</title>
<meta name="description" content="{% block description %}Профессиональный отчёт о развитии ребёнка по его рисункам{% endblock %}">
{% block og %}{% endblock %}
<link rel="preload" href="{{ static }}/fonts/rubik-900.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ static }}/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="{{ static }}/fonts/caveat-700.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="{{ static }}/css/fonts.css">
<link rel="stylesheet" href="{{ static }}/css/tokens.css">
<link rel="stylesheet" href="{{ static }}/css/components.css">
{% block head %}{% endblock %}
</head>
<body>
{% block body %}{% endblock %}
<footer class="foot wrap">
  {% block footer %}
  Голос рисунка · Образовательное наблюдение, не медицинская диагностика · golosrisunka.ru
  {% endblock %}
</footer>
</body>
</html>
