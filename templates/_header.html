{# Единая шапка сайта: лендинг, страницы, hosted-отчёты. Sticky-полоса навигации. #}
<header class="site-header">
  <div class="wrap site-header__row">
    <a class="logo" href="/" data-ym-goal="header_logo">
      <picture>
        <source media="(max-width:560px)" type="image/webp" srcset="{{ static }}/img/logo-icon.webp">
        <source media="(max-width:560px)" srcset="{{ static }}/img/logo-icon.png">
        <source type="image/webp" srcset="{{ static }}/img/logo-strip.webp">
        <img class="logo__img" src="{{ static }}/img/logo-strip.png"
             alt="Голос рисунка — анализ детского рисунка по фото">
      </picture>
    </a>
    <nav class="site-nav">
      <a href="/#primery" data-ym-goal="header_nav_examples">Примеры</a>
      <a href="/#kak" data-ym-goal="header_nav_how">Как это работает</a>
      <a href="/#ceny" data-ym-goal="header_nav_prices">Цены</a>
      <a href="/blog" data-ym-goal="header_nav_blog">Блог</a>
    </nav>
    <div class="site-header__actions">
      <a class="site-nav__login" href="/login" data-ym-goal="header_login">Войти</a>
      <a class="btn" href="/order" data-ym-goal="header_order">Получить отчёт</a>
    </div>
  </div>
</header>
